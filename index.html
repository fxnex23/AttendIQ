<!DOCTYPE html>
<html>
<head>
  <title>AttendIQ Login</title>
</head>

<body>

<h2>Login</h2>

<input id="id" placeholder="Admission ID"><br><br>
<input id="pass" placeholder="Password" type="password"><br><br>

<button onclick="login()">Login</button>

<div id="dashboard" style="display:none;">
  <h3>Welcome Student</h3>
  <p>Your Attendance: <span id="att"></span>%</p>
</div>

<script>
let users = {
  "A2025BBA11313": { password: "1234", attendance: 78 },
  "student2": { password: "1111", attendance: 65 }
};

function login() {
  let id = document.getElementById("id").value;
  let pass = document.getElementById("pass").value;

  if(users[id] && users[id].password === pass){
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("att").innerText = users[id].attendance;
  } else {
    alert("Wrong ID or Password");
  }
}
</script>

</body>
</html>
